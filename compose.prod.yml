services:
  discord-bot:
    container_name: discord-bot
    image: discord-bot
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - cachenet
      - services-proxy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  cachenet:
    external: true
  services-proxy:
    external: true
